<div class="component-container">
	<h3 class="component-title">Registro de Personas</h3>

	<div class="info-panel">
		<div class="info-item">
			<span class="info-label">Total de Registros:</span>
			<span class="info-value">{{ cantidad() }}</span>
		</div>
	</div>

	<div class="form-group">
		<label for="id">ID</label>
		<input id="id" [(ngModel)]="data().id" type="number" placeholder="Ingresa el ID de la persona" />
	</div>

	<div class="form-group">
		<label for="nombre">Nombre</label>
		<input id="nombre" [(ngModel)]="data().nombre" type="text" placeholder="Ingresa el nombre" />
	</div>

	<div class="form-group">
		<label for="edad">Edad</label>
		<input id="edad" [(ngModel)]="data().edad" type="number" placeholder="Ingresa la edad" />
	</div>

	<div class="button-group">
		<button class="btn-primary" (click)="isnertarPersona()">
			Insertar Persona
		</button>
	</div>
</div>
