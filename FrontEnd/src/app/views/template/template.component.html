<div class="layout-container">
  <!-- Header -->
  <header class="header">
    <div class="header-content">
      <button class="btn-toggle-sidebar" (click)="ToggleSidebar()" aria-label="Alternar sidebar">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <line x1="3" y1="12" x2="21" y2="12"></line>
          <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
      </button>

      <div class="header-logo">
        <span class="logo-icon">📚</span>
        <span class="logo-text">Portal Académico</span>
      </div>

      <div class="header-user">
        <span class="user-name">Admin User</span>
        <button class="btn-logout" aria-label="Cerrar sesión" title="Cerrar sesión">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M10 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h4M16 17l5-5-5-5M21 12H9"></path>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <!-- Main Layout -->
  <div class="main-layout">
    <!-- Sidebar -->
    <aside class="sidebar" [class.cerrado]="!sidebarAbierto()">
      <nav class="sidebar-nav">
        @for (menu of menuItems; track menu.id) {
          <div class="menu-item-wrapper">
            <button
              class="menu-item-toggle"
              (click)="ToggleMenu(menu.id)"
              [class.activo]="EstaMenuExpandido(menu.id)">
              <svg class="menu-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                @switch (menu.icon) {
                  @case ('wrench') {
                    <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 1 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path>
                  }
                  @case ('bar-chart') {
                    <line x1="12" y1="2" x2="12" y2="22"></line>
                    <path d="M17 8h4M5 16h4M9 9h4"></path>
                  }
                  @case ('key') {
                    <path d="M21 2l-9 4m0 0L5 2m16 0v6m0 0L9 6m12 0H3"></path>
                  }
                  @case ('more-horizontal') {
                    <circle cx="12" cy="12" r="1"></circle>
                    <circle cx="19" cy="12" r="1"></circle>
                    <circle cx="5" cy="12" r="1"></circle>
                  }
                }
              </svg>
              <span class="menu-label">{{ menu.label }}</span>
              <svg class="menu-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="6 9 12 15 18 9"></polyline>
              </svg>
            </button>

            @if (EstaMenuExpandido(menu.id) && menu.items) {
              <ul class="submenu">
                @for (submenu of menu.items; track submenu.id) {
                  <li>
                    <a [routerLink]="submenu.route" routerLinkActive="activo" class="submenu-link">
                      <span class="submenu-dot"></span>
                      {{ submenu.label }}
                    </a>
                  </li>
                }
              </ul>
            }
          </div>
        }
      </nav>
    </aside>

    <!-- Workspace -->
    <main class="workspace">
      <div class="workspace-content">
        <router-outlet></router-outlet>
      </div>
    </main>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-content">
      <p>&copy; 2026 Portal Académico. Todos los derechos reservados.</p>
      <div class="footer-links">
        <a href="#" class="footer-link">Privacidad</a>
        <a href="#" class="footer-link">Términos</a>
        <a href="#" class="footer-link">Soporte</a>
      </div>
    </div>
  </footer>
</div>
