<main class="login-layout">
	<section class="login-panel" aria-labelledby="tituloIngreso">
		<p class="login-tag">Portal Academico</p>
		<h1 id="tituloIngreso" class="login-title">Bienvenido</h1>
		<p class="login-subtitle">Ingresa tus credenciales para continuar.</p>

		<form class="login-form" [formGroup]="formularioIngreso" (ngSubmit)="ProcesarIngreso()" novalidate>
			<div class="input-group">
				<label for="usuario">Usuario</label>
				<input
					id="username"
					type="text"
					formControlName="username"
					autocomplete="username"
					placeholder="Ingresa tu username"
					aria-describedby="ayudausername" />
				<small id="ayudausername" class="input-help">Usa tu codigo de username institucional.</small>
			</div>

			<div class="input-group">
				<label for="contrasena">Password</label>
				<input
					id="password"
					type="password"
					formControlName="password"
					autocomplete="current-password"
					placeholder="Ingresa tu password" />
			</div>

			<button type="submit" class="btn-ingresar" [disabled]="!SePuedeIngresar()">
				Ingresar
			</button>
		</form>

	@if (ObtenerErrores().length > 0) {
		<div class="error-container" role="alert">
			<p class="error-title">Por favor, verifica los siguientes errores:</p>
			<ul class="error-list">
				@for (error of ObtenerErrores(); track error) {
					<li>{{ error }}</li>
				}
			</ul>
		</div>
	}
